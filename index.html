<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala | Best Place To Learn English</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind & DaiseyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .poppins {
            font-family: "Poppins", sans-serif;
        }

        .bangla {
            font-family: "Hind Siliguri", sans-serif;
        }
    </style>
</head>

<body class="poppins">

    <header>
        <!-- Navbar -->
        <div class="navbar bg-blue-200/30 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li>
                            <a href="">
                                <i class="fa-solid fa-circle-question"></i> FAQ
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="fa-solid fa-book-open"></i> Learn
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
                <a class="btn btn-ghost text-xl">
                    <span class="text-xl font-semibold">English</span>
                    <img src="./assets/logo.png" alt="">
                    <span>জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 space-x-4">
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-circle-question"></i> FAQ
                        </a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-book-open"></i> Learn
                        </a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- hero section -->
    <section class="flex flex-col-reverse md:flex-row justify-between w-11/12 py-5 mx-auto items-center">
        <div class="space-y-8 flex-1 text-center md:text-left">
            <h2 class="font-bold text-5xl">
                <span class="text-[#00BCFF]">English</span>
                <span> is Easy</span>
            </h2>
            <p class="bangla font-medium">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br> আপনার দক্ষতা বাড়াতে চান, আমাদের
                Interactive Lessons আপনাকে নিয়ে <br> যাবে অন্য একটি Level এ
            </p>
            <div class="space-y-5">
                <input type="text" placeholder="Enter Your Name" class="border border-zinc-900/20 rounded-lg p-2"> <br>
                <input type="password" placeholder="************" class="border border-zinc-900/20 rounded-lg p-2"> <br>
                <button class="btn btn-primary">Get Started</button>
            </div>
        </div>
        <div class="flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>

    <section class="space-y-10">
        <h2 class="font-bold text-5xl text-center">
            <span class="text-[#00BCFF]">let's</span>
            <span> Learn Vocabularies</span>
        </h2>
        <div id="level-container" class="flex flex-wrap gap-5 justify-center">

        </div>
    </section>

    <script src="./scripts/index.js"></script>
</body>

</html>
